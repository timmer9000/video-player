<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #fff;
    }

    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }

    /* Tap-to-unmute overlay (shown only if autoplay was forced muted) */
    #unmute-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      cursor: pointer;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #unmute-overlay.visible { opacity: 1; pointer-events: all; }

    .unmute-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .unmute-icon {
      width: 72px;
      height: 72px;
      border: 2.5px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .unmute-icon svg { width: 30px; height: 30px; fill: #fff; }
    #unmute-overlay:hover .unmute-icon { background: rgba(0,0,0,0.7); }
    .unmute-label {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.9;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    /* Friendly message when ?video= is missing or fails */
    #message {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      z-index: 5;
    }
    #message.visible { display: flex; }
    #message .inner { max-width: 520px; line-height: 1.6; }
    #message code {
      background: #1a1a1a;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.95em;
    }
    #message h1 { font-size: 18px; margin-bottom: 12px; font-weight: 500; }
    #message p { font-size: 14px; opacity: 0.75; }
  </style>
</head>
<body>

  <!--
    CONFIG — set this to your R2 public base URL.
    Either the temporary r2.dev URL (testing) or your custom domain (production).
    Trailing slash is added automatically if missing.
    Example: 'https://pub-xxxxxxxxxxxxxxxx.r2.dev'
             'https://videos.example.com'
  -->
  <script>
    const VIDEO_BASE_URL = 'https://pub-11b0c6aa93f64046a3d6497688ec5a62.r2.dev';
  </script>

  <div id="stage">
    <video
      id="player"
      controls
      autoplay
      playsinline
      preload="auto"
    ></video>
  </div>

  <div id="unmute-overlay">
    <div class="unmute-btn">
      <div class="unmute-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77 0-4.28-2.99-7.86-7-8.77z"/>
        </svg>
      </div>
      <span class="unmute-label">Tap to unmute</span>
    </div>
  </div>

  <div id="message">
    <div class="inner">
      <h1 id="msg-title">No video specified</h1>
      <p id="msg-body">
        Add a <code>?video=</code> parameter to the URL,<br>
        e.g. <code>index.html?video=mymovie.mp4</code>
      </p>
    </div>
  </div>

  <script>
    const player = document.getElementById('player');
    const overlay = document.getElementById('unmute-overlay');
    const message = document.getElementById('message');
    const msgTitle = document.getElementById('msg-title');
    const msgBody = document.getElementById('msg-body');

    function showMessage(title, body) {
      msgTitle.textContent = title;
      msgBody.innerHTML = body;
      message.classList.add('visible');
      player.style.display = 'none';
    }

    const params = new URLSearchParams(window.location.search);
    const videoName = params.get('video');

    if (!videoName) {
      showMessage(
        'No video specified',
        'Add a <code>?video=</code> parameter to the URL,<br>e.g. <code>?video=mymovie.mp4</code>'
      );
    } else {
      const base = VIDEO_BASE_URL.replace(/\/+$/, '');
      const src = `${base}/${encodeURIComponent(videoName)}`;
      player.src = src;

      // Try to play with sound first; fall back to muted autoplay if blocked.
      player.play().catch(() => {
        player.muted = true;
        player.play().then(() => {
          overlay.classList.add('visible');
        }).catch(() => {
          // Even muted autoplay was blocked — user will use the controls.
        });
      });

      player.addEventListener('error', () => {
        showMessage(
          'Video failed to load',
          `Tried: <code>${src}</code><br><br>Check the filename, the bucket's public access, and CORS if applicable.`
        );
      });
    }

    // Tap-to-unmute
    overlay.addEventListener('click', () => {
      player.muted = false;
      player.volume = 1;
      overlay.classList.remove('visible');
    });

    // Best-effort fullscreen on first interaction
    document.addEventListener('click', () => {
      const el = document.documentElement;
      if (document.fullscreenElement) return;
      if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }, { once: true });
  </script>

</body>
</html>
